<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 점심 어디가지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f2; --surface: #ffffff; --border: #e4e2db; --border-hover: #c8c5bc;
      --text-primary: #1a1917; --text-secondary: #706e68; --text-muted: #a09d97;
      --accent: #1D9E75; --accent-dark: #0F6E56;
      --highlight-bg: #e6f9f3; --highlight-border: #1D9E75;
      --tag-bg: #eef9f5; --tag-color: #0F6E56; --tag-border: #b6e8d4;
      --danger: #e24b4a; --danger-light: #fff0f0; --danger-border: #f7c1c1;
      --radius-md: 10px; --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; padding: 40px 20px 80px; }
    .container { max-width: 920px; margin: 0 auto; }

    /* HEADER */
    header { text-align: center; margin-bottom: 36px; }
    header .badge { display: inline-block; font-size: 12px; color: var(--tag-color); background: var(--tag-bg); border: 1px solid var(--tag-border); border-radius: 99px; padding: 4px 14px; margin-bottom: 14px; }
    header h1 { font-size: 30px; font-weight: 700; margin-bottom: 8px; }
    header p { font-size: 14px; color: var(--text-secondary); }

    /* TOOLBAR */
    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
    .btn-edit-mode { font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .btn-edit-mode:hover { background: #f0ede8; border-color: var(--border-hover); }
    .btn-edit-mode.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 48px; }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 16px; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; box-shadow: var(--shadow-sm); position: relative; }
    .card:not(.edit-mode):hover { border-color: var(--border-hover); transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .card.highlighted { border: 2px solid var(--highlight-border); background: var(--highlight-bg); transform: translateY(-3px); box-shadow: 0 0 0 4px rgba(29,158,117,0.12); }
    .card-emoji { font-size: 24px; margin-bottom: 8px; }
    .card-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .card-tag { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 99px; background: var(--tag-bg); color: var(--tag-color); border: 1px solid var(--tag-border); margin-bottom: 9px; font-weight: 500; }
    .card-menu { font-size: 12px; color: var(--text-secondary); line-height: 1.7; }

    /* EDIT OVERLAY */
    .card-delete-btn { display: none; position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; border-radius: 50%; background: var(--danger); color: #fff; border: none; font-size: 14px; line-height: 1; cursor: pointer; align-items: center; justify-content: center; font-weight: 700; }
    .edit-mode .card-delete-btn { display: flex; }
    .card-edit-btn { display: none; margin-top: 10px; width: 100%; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; padding: 6px; border-radius: var(--radius-md); border: 1px solid var(--border); background: #f7f6f2; color: var(--text-secondary); cursor: pointer; }
    .edit-mode .card-edit-btn { display: block; }

    /* ADD CARD */
    .card-add { background: transparent; border: 1.5px dashed var(--border-hover); border-radius: var(--radius-lg); padding: 18px 16px; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 8px; cursor: pointer; color: var(--text-muted); font-size: 13px; font-weight: 500; min-height: 140px; transition: border-color 0.2s, color 0.2s; }
    .card-add:hover { border-color: var(--accent); color: var(--accent); }
    .card-add.visible { display: flex; }
    .card-add-icon { font-size: 26px; }

    /* PICK SECTION */
    .pick-section { text-align: center; }
    .pick-btn { font-family: 'Noto Sans KR', sans-serif; font-size: 17px; font-weight: 700; padding: 16px 44px; border-radius: var(--radius-lg); border: 1.5px solid var(--accent); background: var(--accent); color: #fff; cursor: pointer; transition: background 0.15s, transform 0.1s, box-shadow 0.15s; box-shadow: 0 4px 14px rgba(29,158,117,0.25); }
    .pick-btn:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    .pick-btn:active { transform: scale(0.97); }
    .pick-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .result-box { max-width: 360px; margin: 28px auto 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px 28px; box-shadow: var(--shadow-md); display: none; }
    .result-box.show { display: block; animation: fadeUp 0.4s ease; }
    .result-emoji { font-size: 34px; margin-bottom: 10px; }
    .result-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .result-name { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .result-divider { height: 1px; background: var(--border); margin: 12px 0; }
    .result-tag { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 99px; background: var(--tag-bg); color: var(--tag-color); border: 1px solid var(--tag-border); font-weight: 500; }
    .result-menu { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-top: 10px; }

    /* MODAL */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: fadeUp 0.25s ease; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .field input, .field select { width: 100%; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; padding: 9px 12px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn-cancel { flex: 1; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; padding: 10px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; }
    .btn-cancel:hover { background: var(--bg); }
    .btn-save { flex: 2; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; padding: 10px; border-radius: var(--radius-md); border: none; background: var(--accent); color: #fff; cursor: pointer; }
    .btn-save:hover { background: var(--accent-dark); }

    /* COUNTER */
    .count-badge { display: inline-block; font-size: 11px; color: var(--tag-color); background: var(--tag-bg); border: 1px solid var(--tag-border); border-radius: 99px; padding: 2px 10px; margin-left: 6px; vertical-align: middle; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    footer { text-align: center; margin-top: 60px; font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">🍽️ 회사 근처 맛집</div>
    <h1>오늘 점심 어디가지?</h1>
    <p>버튼을 눌러 오늘의 점심을 추첨해보세요</p>
  </header>

  <div class="toolbar">
    <button class="btn-edit-mode" id="edit-toggle" onclick="toggleEditMode()">✏️ 편집하기</button>
  </div>

  <div class="grid" id="grid">
    <div class="card-add" id="card-add" onclick="openModal(null)">
      <div class="card-add-icon">＋</div>
      <div>식당 추가하기</div>
    </div>
  </div>

  <div class="pick-section" id="pick-section">
    <button class="pick-btn" id="pick-btn" onclick="pickRandom()">🎲 오늘의 점심 추첨하기</button>
    <div class="result-box" id="result-box">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-label">오늘의 점심 추천</div>
      <div class="result-name" id="result-name"></div>
      <div class="result-divider"></div>
      <span class="result-tag" id="result-tag"></span>
      <div class="result-menu" id="result-menu"></div>
    </div>
  </div>

  <footer>맛있는 점심 되세요 😊</footer>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h2 id="modal-title">식당 추가</h2>
    <div class="field">
      <label>식당 이름 *</label>
      <input type="text" id="f-name" placeholder="예: 카츠진" />
    </div>
    <div class="field">
      <label>이모지</label>
      <input type="text" id="f-emoji" placeholder="예: 🍱" maxlength="4" />
    </div>
    <div class="field">
      <label>음식 종류 *</label>
      <select id="f-tag">
        <option>한식</option><option>일식</option><option>중식</option>
        <option>분식</option><option>경양식</option><option>도시락</option><option>기타</option>
      </select>
    </div>
    <div class="field">
      <label>대표 메뉴 *</label>
      <input type="text" id="f-menus" placeholder="예: 설렁탕, 도가니탕" />
      <div class="hint">쉼표(,)로 구분해서 입력하세요</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveRestaurant()">저장</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'lunch-restaurants-v1';

const DEFAULT_RESTAURANTS = [
  { name:"카츠진",         emoji:"🍱", tag:"일식",   menus:["일식카츠"] },
  { name:"팔육",           emoji:"🥩", tag:"한식",   menus:["육회비빔밥","고추장찌개 (점심특선)"] },
  { name:"취복루",         emoji:"🥢", tag:"중식",   menus:["가지튀김덮밥"] },
  { name:"거구회관",       emoji:"🍲", tag:"한식",   menus:["순두부찌개","내장탕"] },
  { name:"명인설렁탕",     emoji:"🥣", tag:"한식",   menus:["설렁탕"] },
  { name:"금자김밥",       emoji:"🍙", tag:"분식",   menus:["다양한 김밥"] },
  { name:"토속골",         emoji:"🍗", tag:"한식",   menus:["닭개장","닭곰탕"] },
  { name:"소복식당",       emoji:"🐟", tag:"한식",   menus:["고등어구이","소고기 장터국밥","삼겹정식","고추장제육볶음 (점심특선)"] },
  { name:"한솥도시락",     emoji:"🍱", tag:"도시락", menus:["다양한 도시락"] },
  { name:"무공돈까스",     emoji:"🍛", tag:"경양식", menus:["경양식 돈까스","분식"] },
  { name:"국수나무",       emoji:"🍜", tag:"분식",   menus:["국수","분식"] },
  { name:"산목",           emoji:"🍝", tag:"중식",   menus:["중화국수","볶음우동","김치말이국수","카레라이스"] },
  { name:"샤브로21",       emoji:"🫕", tag:"일식",   menus:["1인 샤브샤브"] },
  { name:"두꺼비부대찌개", emoji:"🍲", tag:"한식",   menus:["부대찌개"] },
];

let restaurants = [];
let editMode = false;
let editingIndex = null;
let lastPick = -1;
let running = false;

// --- Storage ---
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    restaurants = raw ? JSON.parse(raw) : [...DEFAULT_RESTAURANTS];
  } catch(e) { restaurants = [...DEFAULT_RESTAURANTS]; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(restaurants));
}

// --- Render ---
function renderAll() {
  const grid = document.getElementById('grid');
  const addCard = document.getElementById('card-add');
  // remove existing cards (not the add card)
  grid.querySelectorAll('.card').forEach(c => c.remove());

  restaurants.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (editMode ? ' edit-mode' : '');
    card.id = 'card-' + i;
    card.innerHTML = `
      <button class="card-delete-btn" onclick="deleteRestaurant(${i})" title="삭제">×</button>
      <div class="card-emoji">${r.emoji || '🍽️'}</div>
      <div class="card-name">${r.name}</div>
      <span class="card-tag">${r.tag}</span>
      <div class="card-menu">${r.menus.join('<br>')}</div>
      <button class="card-edit-btn" onclick="openModal(${i})">✏️ 수정</button>
    `;
    grid.insertBefore(card, addCard);
  });

  // show/hide add card
  addCard.classList.toggle('visible', editMode);

  // update badge
  document.querySelector('header .badge').textContent = `🍽️ 회사 근처 맛집 ${restaurants.length}곳`;
}

// --- Edit mode ---
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-toggle');
  btn.textContent = editMode ? '✅ 편집 완료' : '✏️ 편집하기';
  btn.classList.toggle('active', editMode);
  renderAll();
}

// --- Delete ---
function deleteRestaurant(i) {
  if (!confirm(`"${restaurants[i].name}"을(를) 삭제할까요?`)) return;
  restaurants.splice(i, 1);
  save();
  renderAll();
}

// --- Modal ---
function openModal(i) {
  editingIndex = i;
  const isEdit = i !== null;
  document.getElementById('modal-title').textContent = isEdit ? '식당 수정' : '식당 추가';
  if (isEdit) {
    const r = restaurants[i];
    document.getElementById('f-name').value = r.name;
    document.getElementById('f-emoji').value = r.emoji || '';
    document.getElementById('f-tag').value = r.tag;
    document.getElementById('f-menus').value = r.menus.join(', ');
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-emoji').value = '';
    document.getElementById('f-tag').value = '한식';
    document.getElementById('f-menus').value = '';
  }
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  editingIndex = null;
}

function saveRestaurant() {
  const name = document.getElementById('f-name').value.trim();
  const emoji = document.getElementById('f-emoji').value.trim() || '🍽️';
  const tag = document.getElementById('f-tag').value;
  const menusRaw = document.getElementById('f-menus').value.trim();
  if (!name) { alert('식당 이름을 입력해주세요.'); return; }
  if (!menusRaw) { alert('메뉴를 입력해주세요.'); return; }
  const menus = menusRaw.split(',').map(m => m.trim()).filter(Boolean);
  const item = { name, emoji, tag, menus };
  if (editingIndex !== null) {
    restaurants[editingIndex] = item;
  } else {
    restaurants.push(item);
  }
  save();
  closeModal();
  renderAll();
}

// close modal on backdrop click
document.getElementById('modal-backdrop').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Enter to save
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('modal-backdrop').classList.contains('open')) {
    saveRestaurant();
  }
  if (e.key === 'Escape') closeModal();
});

// --- Pick random ---
function pickRandom() {
  if (running || restaurants.length === 0) return;
  running = true;
  const btn = document.getElementById('pick-btn');
  btn.disabled = true;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
  const resultBox = document.getElementById('result-box');
  resultBox.classList.remove('show');

  let count = 0, current = -1;
  const total = 20;
  const interval = setInterval(() => {
    if (current >= 0) document.getElementById('card-' + current)?.classList.remove('highlighted');
    current = Math.floor(Math.random() * restaurants.length);
    document.getElementById('card-' + current)?.classList.add('highlighted');
    count++;
    if (count >= total) {
      clearInterval(interval);
      let pick = Math.floor(Math.random() * restaurants.length);
      if (restaurants.length > 1) while (pick === lastPick) pick = Math.floor(Math.random() * restaurants.length);
      lastPick = pick;
      document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
      document.getElementById('card-' + pick)?.classList.add('highlighted');
      document.getElementById('card-' + pick)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
      const r = restaurants[pick];
      document.getElementById('result-emoji').textContent = r.emoji || '🍽️';
      document.getElementById('result-name').textContent = r.name;
      document.getElementById('result-tag').textContent = r.tag;
      document.getElementById('result-menu').innerHTML = r.menus.join('<br>');
      resultBox.classList.add('show');
      btn.disabled = false;
      running = false;
      setTimeout(() => document.querySelector('.pick-section').scrollIntoView({ behavior:'smooth', block:'nearest' }), 300);
    }
  }, count < 12 ? 80 : 140);
}

// --- Init ---
load();
renderAll();
</script>
</body>
</html>
